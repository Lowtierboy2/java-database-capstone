name: Backend Compile

on:
  push:
  pull_request:

jobs:
  compile-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile backend
        working-directory: app
        run: mvn -B clean compile
