<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />
    <title>Doctor Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}" />

    <!--
        FIX 1: was @{/js/components/modal.js} — file is named "modals.js"
        FIX 2: was @{/js/utils/render.js} and @{/js/utils/util.js} — files live at
               /js/render.js and /js/util.js (no utils/ subfolder)
        FIX 3: header.js and footer.js use export — must be type="module"
        FIX 4: modals.js is already in the doctorDashboard.js module graph — removed
               the duplicate non-module script tag.
    -->
    <script type="module" defer th:src="@{/js/components/header.js}"></script>
    <script type="module" defer th:src="@{/js/components/footer.js}"></script>

    <!-- Page-Specific JS -->
    <script type="module" defer th:src="@{/js/doctorDashboard.js}"></script>
</head>

<body>

<div class="container">
    <div class="wrapper">

        <!-- Header -->
        <div id="header"></div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Search Bar -->
            <input
                    type="text"
                    id="searchBar"
                    class="searchBar"
                    placeholder="Search patients by name..."
            />

            <!-- Filters -->
            <div class="filters">
                <button id="todayButton" class="btn-primary">Today's Appointments</button>
                <input type="date" id="datePicker" />
            </div>

            <!-- Patient Table -->
            <table class="patient-table">
                <thead>
                <tr>
                    <th>Patient ID</th>
                    <th>Name</th>
                    <th>Phone No.</th>
                    <th>Email</th>
                    <th>Prescription</th>
                </tr>
                </thead>
                <tbody id="patientTableBody"></tbody>
            </table>

        </div>

        <!-- Footer -->
        <div id="footer"></div>

    </div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="modal-close" class="close">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

</body>
</html>
