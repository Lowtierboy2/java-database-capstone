<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />
    <title>Admin Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />

    <!--
        FIX 1: was @{/js/components/modal.js} — file is named "modals.js"
        FIX 2: was @{/js/utils/render.js} and @{/js/utils/util.js} — there is no utils/
               subfolder; files live at /js/render.js and /js/util.js
        FIX 3: header.js, footer.js, render.js all use ES module import/export — they must
               be loaded as type="module", otherwise the browser throws SyntaxError on
               the export keyword.
        FIX 4: doctorCard.js and modals.js are already pulled in via the adminDashboard.js
               module graph — removed the duplicate non-module script tags for them.
    -->
    <script type="module" defer th:src="@{/js/components/header.js}"></script>
    <script type="module" defer th:src="@{/js/components/footer.js}"></script>

    <!-- Page-Specific JS (module — imports render.js, util.js, services, components) -->
    <script type="module" defer th:src="@{/js/adminDashboard.js}"></script>
</head>

<body>

<div class="container">
    <div class="wrapper">

        <!-- Header -->
        <div id="header"></div>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Search Bar -->
            <div class="search-section">
                <input type="text" id="searchBar" placeholder="Search doctors by name..." />
            </div>

            <!-- Filters -->
            <div class="filters">
                <select id="timeFilter">
                    <option value="">Filter by Time</option>
                    <option value="AM">AM</option>
                    <option value="PM">PM</option>
                </select>

                <select id="specialtyFilter">
                    <option value="">Filter by Specialty</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Dermatology">Dermatology</option>
                    <option value="Neurology">Neurology</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="General Medicine">General Medicine</option>
                </select>

                <button id="addDoctorBtn" class="btn-primary">Add Doctor</button>
            </div>

            <!-- Dynamic Content Area -->
            <div id="content" class="content-area"></div>

        </main>

        <!-- Footer -->
        <div id="footer"></div>

    </div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="modal-close" class="close">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

</body>
</html>
