<!-- index.html -->

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Select Role</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />

    <!-- Stylesheets -->
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/index.css}" />

    <!-- Utility & Component Scripts -->
    <script defer th:src="@{/js/utils/util.js}"></script>
    <script defer th:src="@{/js/utils/render.js}"></script>
    <script defer th:src="@{/js/components/header.js}"></script>
    <script defer th:src="@{/js/components/footer.js}"></script>

    <!-- Page-Specific Logic -->
    <script type="module" defer th:src="@{/js/index.js}"></script>
</head>

<body>

<div class="container">
    <div class="wrapper">

        <!-- Header Placeholder -->
        <div id="header"></div>

        <!-- Main Section -->
        <main class="main-content">
            <h2>Select Your Role</h2>

            <button id="adminBtn" class="dashboard-btn">Admin</button>
            <button id="patientBtn" class="dashboard-btn">Patient</button>
            <button id="doctorBtn" class="dashboard-btn">Doctor</button>
        </main>

        <!-- Footer Placeholder -->
        <div id="footer"></div>

    </div>
</div>

<!-- Modal Structure -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="modal-close" class="close">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

</body>
</html>
